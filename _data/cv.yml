        summary: "Led the team as captain; formulated and edited the solution for Problem C. Applied natural spline regression to model the relationship between maternal features and fetal Y-chromosome concentration vs. gestational age; used decision trees to partition optimal BMI intervals; employed Bootstrap, cross-validation, SMOTE, and LASSO regression to determine safe NIPT testing windows across different BMI conditions."

