        summary: "Led mathematical modeling of a sustainable tourism system for Juneau, AK. Built an Entropy-AHP multi-criteria decision framework; designed a nonlinear programming model with linear-weighted scalarization; used MATLAB SQP to achieve Pareto improvement at the critical threshold of 1.7×10⁶ visitors/year. Performed robustness testing via parameter perturbation (5% perturbation → 9.97% objective fluctuation) and successfully migrated the model to Denver."

